spring.application.name=incident-safety-reporting-system

# ==============================
# Database (H2 for dev, switch to PostgreSQL for prod)
# ==============================
spring.datasource.url=jdbc:h2:mem:safemine
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PostgreSQL (uncomment for production)
# spring.datasource.url=jdbc:postgresql://localhost:5432/safemine
# spring.datasource.username=postgres
# spring.datasource.password=yourpassword
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ==============================
# JWT
# ==============================
app.jwt.secret=SafeMineSecretKey2024VeryLongSecretKeyForJWTSigning
app.jwt.expiration=86400000

# ==============================
# CORS
# ==============================
app.cors.allowed-origins=http://localhost:4200

# ==============================
# Server
# ==============================
server.port=8080

# ==============================
# Swagger / OpenAPI
# ==============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.default-models-expand-depth=-1
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.disable-swagger-default-url=true

# ==============================
# Mail (configure for production)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your@email.com
spring.mail.password=yourpassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
