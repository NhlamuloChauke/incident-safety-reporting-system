spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:safemine}
spring.datasource.username=${DB_USERNAME:safemine}
spring.datasource.password=${DB_PASSWORD:safemine}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=false

app.cors.allowed-origins=${CORS_ORIGINS:http://localhost}

app.jwt.secret=${JWT_SECRET:SafeMineDockerSecretKeyPleaseChangeInProduction!}
app.jwt.expiration=86400000

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
