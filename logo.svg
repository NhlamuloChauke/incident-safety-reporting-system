<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC4400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="320" height="80" rx="12" fill="url(#bgGrad)"/>

  <!-- Shield icon -->
  <g transform="translate(16, 10)">
    <path d="M30 4 L54 14 L54 34 C54 48 42 58 30 62 C18 58 6 48 6 34 L6 14 Z"
          fill="url(#shieldGrad)" />
    <!-- Helmet/hard hat inside shield -->
    <path d="M20 38 L40 38 L40 40 L20 40 Z" fill="white" opacity="0.9"/>
    <path d="M18 38 C18 30 22 24 30 22 C38 24 42 30 42 38 Z" fill="white" opacity="0.9"/>
    <!-- Warning triangle -->
    <path d="M30 27 L35 35 L25 35 Z" fill="#FF6B00"/>
    <text x="29.5" y="34" font-size="6" fill="white" font-weight="bold" text-anchor="middle">!</text>
  </g>

  <!-- Main title -->
  <text x="78" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF" letter-spacing="0.5">SAFEMINE</text>

  <!-- Subtitle -->
  <text x="78" y="48" font-family="Arial, sans-serif" font-size="9" fill="#FF6B00" letter-spacing="2" font-weight="600">INCIDENT REPORTING</text>

  <!-- Divider line -->
  <line x1="78" y1="53" x2="304" y2="53" stroke="#FF6B00" stroke-width="1" opacity="0.4"/>

  <!-- Tagline -->
  <text x="78" y="66" font-family="Arial, sans-serif" font-size="8" fill="#8899AA" letter-spacing="1">SAFETY · COMPLIANCE · MINING</text>

  <!-- Right accent dots -->
  <circle cx="292" cy="25" r="3" fill="#FF6B00" opacity="0.8"/>
  <circle cx="301" cy="25" r="3" fill="#FF6B00" opacity="0.4"/>
  <circle cx="310" cy="25" r="3" fill="#FF6B00" opacity="0.2"/>
</svg>
