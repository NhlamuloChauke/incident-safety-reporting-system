server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the Spring Boot backend
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Swagger UI passthrough (optional — access via backend port directly)
    location /swagger-ui/ {
        proxy_pass http://backend:8080/swagger-ui/;
    }
    location /v3/api-docs {
        proxy_pass http://backend:8080/v3/api-docs;
    }

    # Angular — SPA fallback for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
