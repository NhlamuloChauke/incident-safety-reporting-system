<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" width="1280" height="780">
  <rect width="1280" height="780" fill="#FAFAFA"/>

  <!-- Top nav bar -->
  <rect width="1280" height="52" fill="#1B1B1B"/>
  <rect x="16" y="14" width="120" height="24" rx="4" fill="#85EA2D20"/>
  <text x="76" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#85EA2D" text-anchor="middle">swagger</text>
  <text x="220" y="30" font-family="Arial, sans-serif" font-size="13" fill="#94A3B8">http://localhost:8080/v3/api-docs</text>
  <rect x="1060" y="12" width="100" height="28" rx="4" fill="#85EA2D"/>
  <text x="1110" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1B1B1B" text-anchor="middle">Authorize 🔒</text>

  <!-- API title block -->
  <rect y="52" width="1280" height="100" fill="#FAFAFA" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="24" y="68" width="6" height="68" rx="3" fill="#85EA2D"/>
  <text x="44" y="94" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1E293B">SafeMine — Mine Incident &amp; Safety Reporting System</text>
  <text x="44" y="116" font-family="Arial, sans-serif" font-size="13" fill="#475569">SafeMine is a centralised platform for reporting, tracking, and resolving workplace incidents in mining operations.</text>
  <rect x="44" y="124" width="48" height="20" rx="4" fill="#EFF6FF"/>
  <text x="68" y="138" font-family="Arial, sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle">OAS 3.0</text>
  <rect x="100" y="124" width="54" height="20" rx="4" fill="#F0FDF4"/>
  <text x="127" y="138" font-family="Arial, sans-serif" font-size="11" fill="#15803D" text-anchor="middle">v 1.0.0</text>

  <!-- Servers bar -->
  <rect y="152" width="1280" height="44" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="178" font-family="Arial, sans-serif" font-size="13" fill="#475569">Servers</text>
  <rect x="108" y="160" width="280" height="28" rx="4" fill="white" stroke="#CBD5E1" stroke-width="1"/>
  <text x="120" y="178" font-family="monospace" font-size="12" fill="#1E293B">http://localhost:8080  —  dev</text>

  <!-- Tag: Authentication -->
  <rect x="24" y="212" width="1232" height="52" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="48" y="243" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#15803D">Authentication</text>
  <text x="260" y="243" font-family="Arial, sans-serif" font-size="13" fill="#475569">Login and token management</text>
  <text x="1220" y="243" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle">∧</text>

  <!-- POST /api/auth/login — expanded -->
  <rect x="24" y="272" width="1232" height="60" rx="6" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
  <rect x="32" y="285" width="56" height="26" rx="4" fill="#4CAF50"/>
  <text x="60" y="302" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">POST</text>
  <text x="100" y="302" font-family="monospace" font-size="13" fill="#1E293B">/api/auth/login</text>
  <text x="380" y="302" font-family="Arial, sans-serif" font-size="13" fill="#475569">Login — Authenticate with email and password. Returns a signed JWT valid for 24 hours.</text>
  <rect x="1148" y="283" width="80" height="26" rx="4" fill="#4CAF5020"/>
  <text x="1188" y="300" font-family="Arial, sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">Try it out</text>

  <!-- Tag: Incidents -->
  <rect x="24" y="348" width="1232" height="52" rx="6" fill="#FFF8F0" stroke="#FFE0B2" stroke-width="1"/>
  <text x="48" y="379" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#E65100">Incidents</text>
  <text x="200" y="379" font-family="Arial, sans-serif" font-size="13" fill="#475569">Create, retrieve, and update mine incidents</text>
  <text x="1220" y="379" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle">∧</text>

  <!-- GET /api/incidents -->
  <rect x="24" y="408" width="1232" height="52" rx="6" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <rect x="32" y="421" width="44" height="26" rx="4" fill="#2196F3"/>
  <text x="54" y="438" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">GET</text>
  <text x="88" y="438" font-family="monospace" font-size="13" fill="#1E293B">/api/incidents</text>
  <text x="320" y="438" font-family="Arial, sans-serif" font-size="13" fill="#475569">List all incidents</text>
  <rect x="1220" y="419" width="20" height="14" rx="2" fill="#2196F320"/>
  <text x="1230" y="430" font-family="Arial" font-size="11" fill="#1565C0" text-anchor="middle">∨</text>

  <!-- POST /api/incidents -->
  <rect x="24" y="468" width="1232" height="52" rx="6" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
  <rect x="32" y="481" width="56" height="26" rx="4" fill="#4CAF50"/>
  <text x="60" y="498" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">POST</text>
  <text x="100" y="498" font-family="monospace" font-size="13" fill="#1E293B">/api/incidents</text>
  <text x="320" y="498" font-family="Arial, sans-serif" font-size="13" fill="#475569">Report a new incident</text>
  <rect x="1148" y="479" width="80" height="26" rx="4" fill="#4CAF5020"/>
  <text x="1188" y="496" font-family="Arial, sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">Try it out</text>

  <!-- GET /api/incidents/{id} -->
  <rect x="24" y="528" width="1232" height="52" rx="6" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <rect x="32" y="541" width="44" height="26" rx="4" fill="#2196F3"/>
  <text x="54" y="558" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">GET</text>
  <text x="88" y="558" font-family="monospace" font-size="13" fill="#1E293B">/api/incidents/{id}</text>
  <text x="320" y="558" font-family="Arial, sans-serif" font-size="13" fill="#475569">Get a single incident</text>

  <!-- PATCH /api/incidents/{id}/status -->
  <rect x="24" y="588" width="1232" height="52" rx="6" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1"/>
  <rect x="32" y="601" width="60" height="26" rx="4" fill="#FF9800"/>
  <text x="62" y="618" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">PATCH</text>
  <text x="104" y="618" font-family="monospace" font-size="13" fill="#1E293B">/api/incidents/{id}/status</text>
  <text x="400" y="618" font-family="Arial, sans-serif" font-size="13" fill="#475569">Update incident status</text>
  <rect x="1080" y="599" width="148" height="26" rx="4" fill="#FF980015"/>
  <text x="1154" y="616" font-family="Arial, sans-serif" font-size="11" fill="#E65100" text-anchor="middle">🔒 SAFETY_OFFICER+</text>

  <!-- PATCH /api/incidents/{id}/root-cause -->
  <rect x="24" y="648" width="1232" height="52" rx="6" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1"/>
  <rect x="32" y="661" width="60" height="26" rx="4" fill="#FF9800"/>
  <text x="62" y="678" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">PATCH</text>
  <text x="104" y="678" font-family="monospace" font-size="13" fill="#1E293B">/api/incidents/{id}/root-cause</text>
  <text x="420" y="678" font-family="Arial, sans-serif" font-size="13" fill="#475569">Record root cause</text>
  <rect x="1080" y="659" width="148" height="26" rx="4" fill="#FF980015"/>
  <text x="1154" y="676" font-family="Arial, sans-serif" font-size="11" fill="#E65100" text-anchor="middle">🔒 SAFETY_OFFICER+</text>

  <!-- Tag: Users (collapsed) -->
  <rect x="24" y="716" width="1232" height="52" rx="6" fill="#FFF0F3" stroke="#FECDD3" stroke-width="1"/>
  <text x="48" y="747" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#BE123C">Users</text>
  <text x="160" y="747" font-family="Arial, sans-serif" font-size="13" fill="#475569">User account management — Admin only</text>
  <text x="1220" y="747" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle">∨</text>
</svg>
