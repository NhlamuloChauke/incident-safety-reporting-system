<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </linearGradient>
    <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#CC4400"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00000033"/></filter>
  </defs>

  <!-- Left panel -->
  <rect width="640" height="720" fill="url(#lg)"/>

  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="120" fill="#FF6B0010"/>
  <circle cx="560" cy="640" r="160" fill="#FF6B0008"/>
  <circle cx="400" cy="200" r="80" fill="#FF6B0006"/>

  <!-- Shield logo -->
  <g transform="translate(270, 140)">
    <circle cx="50" cy="50" r="50" fill="#FF6B0020"/>
    <path d="M50 8 L82 22 L82 50 C82 68 67 82 50 88 C33 82 18 68 18 50 L18 22 Z" fill="url(#og)"/>
    <path d="M38 46 L46 54 L62 38" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Left text -->
  <text x="320" y="260" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">SafeMine</text>
  <text x="320" y="290" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Mine Incident &amp; Safety Reporting System</text>

  <!-- Feature list -->
  <g transform="translate(160, 340)">
    <circle cx="12" cy="12" r="10" fill="#FF6B0030"/>
    <text x="12" y="16" font-family="Arial" font-size="12" fill="#FF6B00" text-anchor="middle">✓</text>
    <text x="34" y="16" font-family="Arial, sans-serif" font-size="14" fill="#CBD5E1">Real-time incident reporting</text>

    <circle cx="12" cy="52" r="10" fill="#FF6B0030"/>
    <text x="12" y="56" font-family="Arial" font-size="12" fill="#FF6B00" text-anchor="middle">✓</text>
    <text x="34" y="56" font-family="Arial, sans-serif" font-size="14" fill="#CBD5E1">DMR compliance tracking</text>

    <circle cx="12" cy="92" r="10" fill="#FF6B0030"/>
    <text x="12" y="96" font-family="Arial" font-size="12" fill="#FF6B00" text-anchor="middle">✓</text>
    <text x="34" y="96" font-family="Arial, sans-serif" font-size="14" fill="#CBD5E1">Corrective action management</text>

    <circle cx="12" cy="132" r="10" fill="#FF6B0030"/>
    <text x="12" y="136" font-family="Arial" font-size="12" fill="#FF6B00" text-anchor="middle">✓</text>
    <text x="34" y="136" font-family="Arial, sans-serif" font-size="14" fill="#CBD5E1">Safety analytics dashboard</text>
  </g>

  <!-- Right panel -->
  <rect x="640" width="640" height="720" fill="#F8FAFC"/>

  <!-- Login card -->
  <rect x="720" y="140" width="480" height="440" rx="16" fill="white" filter="url(#shadow)"/>

  <!-- Card header -->
  <text x="960" y="210" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1E293B" text-anchor="middle">Welcome back</text>
  <text x="960" y="238" font-family="Arial, sans-serif" font-size="14" fill="#64748B" text-anchor="middle">Sign in to your SafeMine account</text>

  <!-- Divider -->
  <line x1="760" y1="260" x2="1160" y2="260" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Email field -->
  <text x="760" y="295" font-family="Arial, sans-serif" font-size="12" fill="#475569">Email Address</text>
  <rect x="760" y="302" width="400" height="46" rx="8" fill="white" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="778" y="330" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8">admin@safemine.co.za</text>

  <!-- Password field -->
  <text x="760" y="372" font-family="Arial, sans-serif" font-size="12" fill="#475569">Password</text>
  <rect x="760" y="379" width="400" height="46" rx="8" fill="white" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="778" y="407" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8">••••••••••</text>
  <text x="1136" y="407" font-family="Arial, sans-serif" font-size="13" fill="#94A3B8">👁</text>

  <!-- Sign in button -->
  <rect x="760" y="448" width="400" height="48" rx="8" fill="url(#og)"/>
  <text x="960" y="477" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">Sign In</text>

  <!-- Footer note -->
  <text x="960" y="530" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Protected by JWT authentication · SafeMine v1.0</text>

  <!-- Bottom bar -->
  <rect x="640" y="680" width="640" height="40" fill="#F1F5F9"/>
  <text x="960" y="705" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">© 2024 SafeMine — NCPC-SA / CSIR Mine Safety Platform</text>
</svg>
